<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htnml Events </title>
</head>
<body style="background-color: #414141; color: aliceblue;">
    <h2>Amazing image</h2>
    <div >
        <ul id="images">
            <li><img width="200px" id="photoshop" src="https://images.pexels.com/photos/3561339/pexels-photo-3561339.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="photoshop"></li>
            <li><img width="200px" id="japan" src="https://images.pexels.com/photos/3532553/pexels-photo-3532553.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><img width="200px" id="river" src="https://images.pexels.com/photos/3532551/pexels-photo-3532551.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><img width="200px" id="owl" src="https://images.pexels.com/photos/3532552/pexels-photo-3532552.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""  ></li>
            <!-- <li><img width="200px" id="owl" src="https://images.pexels.com/photos/3532552/pexels-photo-3532552.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="" onclick="alert('owl')" ></li> we should avoid this type of alert -->
            <li><img width="200px" id="prayer" src="https://images.pexels.com/photos/2522671/pexels-photo-2522671.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="" ></li>
            <li><a style="color: aliceblue;" href="https://google.com" id="google">Google</a></li>
        </ul>
   </div>
</body>

<script>
//    document.getElementById('owl').onclick=function(){
//     alert("owl clicked") // this method is ok but better is to use evet listeners
//     // bcz event listeners gives propagation ability
//    }
// alternatives more --> attachEvent() , Jquery - on

document.getElementById('owl').addEventListener('click',function(e){
      alert("owl clciked again")
    //   e.stopPropagation() // only shows owl msg none more/ no more events occurs with it
},false) // false -> default
// both are false thats why it is Event Bubbling if they both are true its called Event capturing

//Event propagation
document.getElementById('images').addEventListener('click',function(e){
      alert("click inside the ul")
},false) 


document.getElementById('google').addEventListener('click',function(e){
      e.preventDefault(); //the link will not open after clicked
    //   e.stopPropagation();
      console.log("google clicked")
},false)

document.querySelector('#images').addEventListener('click',function(e){
console.log(e.target.parentNode);
if(e.target.tagName==='IMG'){
let removeNode = e.target.parentNode;
removeNode.remove();
}
//or, removeNode.parentNode.removeChild(removeNode)
})

</script>
</html>



<!-- javascript is a sequentially run language . but sometimes it is 
asynchronus . like browser events activities .  -->

<!-- events -> types, timestamp, preventedDefault , target , toElement , srcElement , currentTarget , clientX, clientY, screenX, screenY , altkey, ctrKey, shiftkey , keyCode  -->
<!-- event propagation -> 1)Event bubbling , 2)Event capturing -->

<!-- Event bubbling -> if we set a alert or msg to the child node and also its parent node then the 
 child node's msg prints first then parent node's msg its called bubbling up. like a buuble 
 blow up from small to large  (bottom to top) -->

<!-- Event capturing -> just opposite of Event bubbling  (top to bottom)
   then default value is false not true -->
