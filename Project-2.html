<!-- tells you which keyboard key you pressed -->
<!DOCTYPE html>
<html>
<head>
    <title>Key check</title>
    <style>
        body{
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .color{
            color:black;
            padding:10px;
            margin-top:10px;
        }
        table,th,td{
            border: 1px solid blanchedalmond;
            background-color: cadetblue;
            border-collapse: collapse;
            padding:25px;
            font-size: 25px;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

<div class="project">
    <div class="insert">
        <div class="key">Press the Key and watch magic</div>
    </div>
</div>
<script>
  const insert = document.querySelector('.insert')
  window.addEventListener('keydown',(e)=>{
    insert.innerHTML = ` 
    <div class='color'>
      <table>
  <tr>
    <th>Key</th>
    <th>Keycode</th>
    <th>Code</th>
  </tr>
  <tr>
    <td>${e.key === " "? "Space" : e.key}</td>
    <td>${e.keyCode}</td>
    <td>${e.code}</td>
  </tr>
</table>
    </div>
     `
  }) //add event listener in whole window
</script>

</body>
</html>
