<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="title" content="dom">
    <meta name="description" content="dom">
    <meta name="keywords" content="blog, article, education">
    <meta name="robots" content="index, follow">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="language" content="English">

    <meta name="author" content="Sayed Mohammed Asim">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | Manipulation</title>
    
</head>
<body style="background-color: #212121; color:#fff;">
   <ul class="language">
         <li>Javascript</li>
   </ul>

  
</body>
<script>
    // add something 

    function addLanguage(langName){
        const li = document.createElement('li');
        li.innerHTML =`${langName}`;
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("python");
    addLanguage("typeScript");
    // in this way function has to traverse the tree each time 
    function addlangOpti(langName){
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langName)) // better approch then innerHTML
        document.querySelector('.language').appendChild(li);
    }
    addlangOpti("python");
    addlangOpti("typeScript");

    //edit something
   const secondLang =  document.querySelector("li:nth-child(2)")
   // secondLang.innerHTML = "Mojo"
   const newli = document.createElement('li');
   newli.textContent = "Mojo";
   secondLang.replaceWith(newli)

   //edit
   const firstlang = document.querySelector("li:first-child")
   firstlang.outerHTML = '<li>c++</li>'

   //remove
   const lastlang = document.querySelector('li:last-child');
   lastlang.remove();

</script>

</html>
