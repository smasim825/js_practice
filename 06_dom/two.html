    <title>DOM | Manipulation</title>
    
</head>
<body style="background-color: #212121; color:#fff;">

  <div class="parent">
    <div class="day">Monday</div>
    <div class="day">Tuesday</div>
    <div class="day">Wednesday</div>
    <div class="day">Thursday</div>
  </div>
</body>
<script>
    const parent = document.querySelector('.parent');
    console.log(parent); //parent class
    console.log(parent.children) //parent class childs -> days
    console.log(parent.children[1].innerHTML); //Tuesday
    // for(let i=0;i<parent.children.length;i++){
    //     console.log(parent.children[i].innerHTML); //print call childs
    // }
    console.log(parent.firstElementChild); //parent.firstElementChild == parent.children[0]
    console.log(parent.lastElementChild); //parent.lastElementChild == parent.children[size-1]
     const dayOne = document.querySelector('.day')
    console.log(dayOne); //monday it choose the first element with class name day
    console.log(dayOne.parentElement); //parent of monday -> parent
    console.log(dayOne.nextElementSibling); //Tuesday

    console.log("NODE:",parent.childNodes) // shows all DOM nodes (objects) shows the tree stucture
</script>

</html>
